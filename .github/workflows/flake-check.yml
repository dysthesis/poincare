name: Nix Flake Check

# Linux-only on purpose (no --all-systems): the runner is x86_64-linux and
# darwin-only tool gaps are already absorbed by mkCheckIfAvailable in
# flake.nix. The matrix runs the full check set on stable Neovim (the gate)
# and the same Neovim-level checks on nightly (a canary that never gates).

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  flake-check:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.canary }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: stable
            command: nix flake check --print-build-logs
            canary: false
          - name: neovim-nightly
            command: nix build .#poincare-nightly-checks --print-build-logs
            canary: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v11
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v5

      - name: Run checks (${{ matrix.name }})
        run: ${{ matrix.command }}
